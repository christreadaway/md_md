<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLAUDE.md Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e11;
      --surface: #17171c;
      --border: #2a2a35;
      --accent: #7b61ff;
      --accent-dim: rgba(123,97,255,0.15);
      --green: #3ddc84;
      --yellow: #f5c542;
      --red: #ff5f5f;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
    }

    header {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.3px;
    }
    header span {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      background: var(--surface);
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    .main {
      display: grid;
      grid-template-columns: 420px 1fr;
      overflow: hidden;
    }

    /* ── Left panel: editor ─────────────────────────────── */
    .editor-panel {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
    }

    textarea#canonical {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.7;
      color: var(--text);
      padding: 20px;
    }

    .editor-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }

    /* ── Right panel: results ───────────────────────────── */
    .results-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .results-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .summary-pill {
      font-family: var(--mono);
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid;
    }
    .pill-green { color: var(--green); border-color: var(--green); }
    .pill-yellow { color: var(--yellow); border-color: var(--yellow); }
    .pill-red { color: var(--red); border-color: var(--red); }

    .results-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .repo-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      overflow: hidden;
    }
    .repo-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      cursor: pointer;
      user-select: none;
    }
    .repo-card-header:hover { background: rgba(255,255,255,0.02); }

    .repo-name {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
    }
    .repo-meta {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 3px 8px;
      border-radius: 4px;
      text-transform: uppercase;
    }
    .badge-sync { background: rgba(61,220,132,0.12); color: var(--green); }
    .badge-diff { background: rgba(245,197,66,0.12); color: var(--yellow); }
    .badge-miss { background: rgba(255,95,95,0.12); color: var(--red); }

    .diff-block {
      display: none;
      border-top: 1px solid var(--border);
      background: #111116;
      overflow-x: auto;
    }
    .diff-block.open { display: block; }

    pre.diff-content {
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.6;
      padding: 14px 16px;
      white-space: pre;
    }

    .diff-add { color: var(--green); }
    .diff-remove { color: var(--red); }
    .diff-meta { color: var(--muted); }

    /* ── Log panel ──────────────────────────────────────── */
    .log-panel {
      border-top: 1px solid var(--border);
      height: 180px;
      display: flex;
      flex-direction: column;
    }
    .log-panel .panel-header { flex-shrink: 0; }

    .log-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px 20px;
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.7;
    }
    .log-info { color: var(--muted); }
    .log-warn { color: var(--yellow); }
    .log-error { color: var(--red); }

    /* ── Buttons ────────────────────────────────────────── */
    .btn {
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn:hover:not(:disabled) { opacity: 0.85; }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-sm {
      font-size: 11px;
      padding: 5px 10px;
    }

    .spacer { flex: 1; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .scanning-indicator {
      display: none;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      animation: pulse 1s infinite alternate;
    }
    @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }

    .empty-state {
      color: var(--muted);
      font-size: 13px;
      padding: 40px 20px;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h1>CLAUDE.md Manager</h1>
  <span>localhost:3333</span>
</header>

<div class="main">

  <!-- LEFT: Canonical editor -->
  <div class="editor-panel">
    <div class="panel-header">
      <span class="panel-title">Canonical CLAUDE.md</span>
    </div>
    <textarea id="canonical" placeholder="Paste or type your canonical CLAUDE.md content here..."></textarea>
    <div class="editor-footer">
      <button class="btn btn-ghost" id="btn-save">Save Canonical</button>
      <button class="btn btn-primary" id="btn-scan">Scan Repos</button>
      <span class="scanning-indicator" id="scanning-label">Scanning...</span>
    </div>
  </div>

  <!-- RIGHT: Results -->
  <div class="results-panel">
    <div class="results-header">
      <span class="panel-title">Repos</span>
      <span class="summary-pill pill-green" id="pill-sync" style="display:none"></span>
      <span class="summary-pill pill-yellow" id="pill-diff" style="display:none"></span>
      <span class="summary-pill pill-red" id="pill-miss" style="display:none"></span>
      <div class="spacer"></div>
      <button class="btn btn-danger btn-sm" id="btn-update-all" style="display:none">Update All Out-of-Sync</button>
    </div>
    <div class="results-list" id="results-list">
      <div class="empty-state">Save your canonical content, then click Scan Repos.</div>
    </div>
  </div>

</div>

<!-- LOG PANEL -->
<div class="log-panel">
  <div class="panel-header">
    <span class="panel-title">Activity Log</span>
    <span class="spacer"></span>
    <button class="btn btn-ghost btn-sm" id="btn-clear-log">Clear</button>
  </div>
  <div class="log-body" id="log-body"></div>
</div>

<script>
  // ─── State ────────────────────────────────────────────────────────────────
  let scanResults = [];
  let logIndex = 0;

  // ─── Elements ─────────────────────────────────────────────────────────────
  const canonicalTA = document.getElementById('canonical');
  const btnSave = document.getElementById('btn-save');
  const btnScan = document.getElementById('btn-scan');
  const btnUpdateAll = document.getElementById('btn-update-all');
  const resultsList = document.getElementById('results-list');
  const logBody = document.getElementById('log-body');
  const scanningLabel = document.getElementById('scanning-label');
  const pillSync = document.getElementById('pill-sync');
  const pillDiff = document.getElementById('pill-diff');
  const pillMiss = document.getElementById('pill-miss');

  // ─── Load canonical on start ──────────────────────────────────────────────
  fetch('/api/canonical')
    .then(r => r.json())
    .then(d => { if (d.content) canonicalTA.value = d.content; });

  // ─── Save canonical ───────────────────────────────────────────────────────
  btnSave.addEventListener('click', async () => {
    const content = canonicalTA.value.trim();
    if (!content) { alert('Nothing to save.'); return; }
    btnSave.disabled = true;
    await fetch('/api/canonical', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content }),
    });
    btnSave.disabled = false;
    appendLog('info', 'Canonical saved.');
  });

  // ─── Scan repos ───────────────────────────────────────────────────────────
  btnScan.addEventListener('click', async () => {
    scanResults = [];
    resultsList.innerHTML = '';
    pillSync.style.display = 'none';
    pillDiff.style.display = 'none';
    pillMiss.style.display = 'none';
    btnUpdateAll.style.display = 'none';
    btnScan.disabled = true;
    scanningLabel.style.display = 'inline';

    let counts = { IN_SYNC: 0, DIFFERENT: 0, MISSING: 0 };

    const es = new EventSource('/api/scan');

    es.onmessage = (e) => {
      const data = JSON.parse(e.data);

      if (data.type === 'error') {
        appendLog('error', data.msg);
        es.close();
        btnScan.disabled = false;
        scanningLabel.style.display = 'none';
        return;
      }

      if (data.type === 'start') {
        appendLog('info', `Scan started — GitHub user: ${data.user}`);
      }

      if (data.type === 'count') {
        appendLog('info', `Found ${data.total} active repos`);
      }

      if (data.type === 'repo') {
        scanResults.push(data);
        counts[data.status]++;
        renderRepoCard(data);
        updatePills(counts);
        if (data.status !== 'IN_SYNC') {
          appendLog(data.status === 'MISSING' ? 'error' : 'warn',
            `[${data.repo}] ${data.status}`);
        } else {
          appendLog('info', `[${data.repo}] IN SYNC`);
        }
      }

      if (data.type === 'done') {
        es.close();
        btnScan.disabled = false;
        scanningLabel.style.display = 'none';
        appendLog('info', `Scan complete — ${counts.IN_SYNC} in sync, ${counts.DIFFERENT} different, ${counts.MISSING} missing`);
        const outOfSync = scanResults.filter(r => r.status !== 'IN_SYNC');
        if (outOfSync.length > 0) btnUpdateAll.style.display = 'inline-block';
      }
    };

    es.onerror = () => {
      es.close();
      btnScan.disabled = false;
      scanningLabel.style.display = 'none';
      appendLog('error', 'SSE connection error — check server console');
    };
  });

  // ─── Update all ───────────────────────────────────────────────────────────
  btnUpdateAll.addEventListener('click', async () => {
    const outOfSync = scanResults
      .filter(r => r.status !== 'IN_SYNC')
      .map(r => ({ repo: r.repo, defaultBranch: r.defaultBranch }));
    await pushRepos(outOfSync);
  });

  async function pushRepos(repos) {
    appendLog('info', `Pushing to ${repos.length} repo(s)...`);
    btnUpdateAll.disabled = true;

    const res = await fetch('/api/update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ repos }),
    });
    const data = await res.json();

    for (const r of data.results) {
      if (r.ok) {
        appendLog('info', `[${r.repo}] SUCCESS`);
        // Update card status visually
        const card = document.querySelector(`[data-repo="${r.repo}"]`);
        if (card) {
          const badge = card.querySelector('.status-badge');
          badge.className = 'status-badge badge-sync';
          badge.textContent = 'IN SYNC';
          card.querySelector('.diff-block')?.remove();
          card.querySelector('.btn-update-single')?.remove();
        }
      } else {
        appendLog('error', `[${r.repo}] FAILED: ${r.error}`);
      }
    }
    btnUpdateAll.disabled = false;
  }

  // ─── Render a repo card ───────────────────────────────────────────────────
  function renderRepoCard(data) {
    const { repo, status, patch, defaultBranch } = data;

    if (resultsList.querySelector('.empty-state')) {
      resultsList.innerHTML = '';
    }

    const card = document.createElement('div');
    card.className = 'repo-card';
    card.dataset.repo = repo;

    const badgeClass = status === 'IN_SYNC' ? 'badge-sync' : status === 'DIFFERENT' ? 'badge-diff' : 'badge-miss';
    const badgeLabel = status === 'IN_SYNC' ? 'In Sync' : status === 'DIFFERENT' ? 'Different' : 'Missing';

    const updateBtn = status !== 'IN_SYNC'
      ? `<button class="btn btn-ghost btn-sm btn-update-single" data-repo="${repo}" data-branch="${defaultBranch}">Update</button>`
      : '';

    card.innerHTML = `
      <div class="repo-card-header" data-toggle>
        <span class="repo-name">${repo}</span>
        <div class="repo-meta">
          <span class="status-badge ${badgeClass}">${badgeLabel}</span>
          ${updateBtn}
        </div>
      </div>
      ${patch ? `<div class="diff-block"><pre class="diff-content">${colorDiff(patch)}</pre></div>` : ''}
    `;

    card.querySelector('[data-toggle]').addEventListener('click', (e) => {
      if (e.target.classList.contains('btn')) return;
      const diff = card.querySelector('.diff-block');
      if (diff) diff.classList.toggle('open');
    });

    const singleBtn = card.querySelector('.btn-update-single');
    if (singleBtn) {
      singleBtn.addEventListener('click', async () => {
        await pushRepos([{ repo, defaultBranch }]);
      });
    }

    resultsList.appendChild(card);
  }

  // ─── Color diff lines ─────────────────────────────────────────────────────
  function colorDiff(patch) {
    return patch
      .split('\n')
      .map(line => {
        const escaped = escapeHtml(line);
        if (line.startsWith('+') && !line.startsWith('+++')) return `<span class="diff-add">${escaped}</span>`;
        if (line.startsWith('-') && !line.startsWith('---')) return `<span class="diff-remove">${escaped}</span>`;
        if (line.startsWith('@') || line.startsWith('---') || line.startsWith('+++')) return `<span class="diff-meta">${escaped}</span>`;
        return escaped;
      })
      .join('\n');
  }

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ─── Update summary pills ─────────────────────────────────────────────────
  function updatePills(counts) {
    pillSync.textContent = `${counts.IN_SYNC} in sync`;
    pillSync.style.display = counts.IN_SYNC ? 'inline-block' : 'none';
    pillDiff.textContent = `${counts.DIFFERENT} different`;
    pillDiff.style.display = counts.DIFFERENT ? 'inline-block' : 'none';
    pillMiss.textContent = `${counts.MISSING} missing`;
    pillMiss.style.display = counts.MISSING ? 'inline-block' : 'none';
  }

  // ─── Log ──────────────────────────────────────────────────────────────────
  function appendLog(level, msg) {
    const ts = new Date().toLocaleTimeString();
    const line = document.createElement('div');
    line.className = `log-${level}`;
    line.textContent = `[${ts}] [${level.toUpperCase()}] ${msg}`;
    logBody.appendChild(line);
    logBody.scrollTop = logBody.scrollHeight;
  }

  document.getElementById('btn-clear-log').addEventListener('click', () => {
    logBody.innerHTML = '';
  });

  // Poll server log for any backend-only entries
  setInterval(async () => {
    try {
      const r = await fetch(`/api/log?since=${logIndex}`);
      const d = await r.json();
      for (const entry of d.entries) {
        appendLog(entry.level, entry.msg);
      }
      logIndex = d.total;
    } catch {}
  }, 2000);
</script>
</body>
</html>
